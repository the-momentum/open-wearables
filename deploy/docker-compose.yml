# OpenWearables deployment stack
#
# Deployed to a dedicated EC2 (separate from lucie-api).
# Uses Traefik as HTTP reverse proxy (no TLS — accessed via EC2 public DNS).
# Images pulled from ECR; this file is synced to /app on the box by CI.
#
# Required env (written by CI from GH Secrets → /app/.env):
#   ENVIRONMENT          = staging | production
#   OW_PUBLIC_HOST       = ec2-xx-xx-xx-xx.compute-1.amazonaws.com (auto-detected by CI)
#   OW_IMAGE_BACKEND     = 031244176128.dkr.ecr.us-east-1.amazonaws.com/rhiseai/open-wearables-backend:<tag>
#   OW_IMAGE_FRONTEND    = 031244176128.dkr.ecr.us-east-1.amazonaws.com/rhiseai/open-wearables-frontend:<tag>
#   OW_DB_NAME           = open-wearables
#   OW_DB_USER           = open-wearables
#   OW_DB_PASSWORD       = <secret>
#   # plus any provider credentials the backend needs (loaded via env_file /app/ow.env)

services:
  # ---------------------------------------------------------------------------
  # Traefik — HTTP reverse proxy (no TLS, EC2 public DNS)
  # Port 80  → frontend dashboard
  # Port 8000 → backend API
  # ---------------------------------------------------------------------------
  # Single HTTPS entrypoint on :443 (TLS via Let's Encrypt TLS-ALPN challenge).
  # Both services share ``ow-staging.getlucie.ai``; routing is path-based:
  #   /api/* → ow-api     (stripPrefix middleware removes /api before forward)
  #   /*     → ow-dashboard
  # :80 exists only to redirect to :443 (required for ACME renewals anyway).
  traefik:
    image: traefik:v3.2
    container_name: traefik
    restart: unless-stopped
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--certificatesresolvers.letsencrypt.acme.email=${SERVER_EMAIL:-admin@getlucie.ai}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      - "--certificatesresolvers.letsencrypt.acme.tlschallenge=true"
      - "--log.level=INFO"
      - "--accesslog=true"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_letsencrypt:/letsencrypt
    networks:
      - ow-network

  # ---------------------------------------------------------------------------
  # Postgres (self-hosted for staging; prod will move to RDS later)
  # ---------------------------------------------------------------------------
  db:
    image: postgres:18
    container_name: ow-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${OW_DB_NAME:-open-wearables}
      POSTGRES_USER: ${OW_DB_USER:-open-wearables}
      POSTGRES_PASSWORD: ${OW_DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${OW_DB_USER:-open-wearables} -d ${OW_DB_NAME:-open-wearables}"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql
    networks:
      - ow-network

  # ---------------------------------------------------------------------------
  # Redis
  # ---------------------------------------------------------------------------
  redis:
    image: redis:8-alpine
    container_name: ow-redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - redis_data:/data
    networks:
      - ow-network

  # ---------------------------------------------------------------------------
  # Svix — outgoing webhooks server (internal only)
  # OW app talks to it at http://svix-server:8071 (default svix_server_url).
  # Shares JWT secret with the app via SECRET_KEY in /app/ow.env.
  # ---------------------------------------------------------------------------
  svix-server:
    image: svix/svix-server:v1
    container_name: svix-server
    restart: unless-stopped
    # The image has no ENTRYPOINT; default Cmd is /usr/local/bin/launch-svix-server.
    # Override Cmd to prepend the binary so --run-migrations is parsed as a flag
    # rather than treated as the executable.
    command: ["/usr/local/bin/launch-svix-server", "--run-migrations"]
    env_file:
      - /app/ow.env
    environment:
      SVIX_DB_DSN: postgresql://${OW_DB_USER:-open-wearables}:${OW_DB_PASSWORD_ENCODED:-${OW_DB_PASSWORD}}@db:5432/svix
      SVIX_QUEUE_TYPE: redis
      SVIX_REDIS_DSN: redis://redis:6379/1
      SVIX_CACHE_TYPE: redis
      SVIX_LOG_LEVEL: info
    expose:
      - "8071"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "svix-server", "healthcheck", "http://localhost:8071"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    networks:
      - ow-network

  # ---------------------------------------------------------------------------
  # Backend API — routed by Traefik on port 8000
  # container_name intentionally omitted so the deploy script can scale to 2
  # replicas for zero-downtime rollouts.
  # ---------------------------------------------------------------------------
  app:
    image: ${OW_IMAGE_BACKEND}
    pull_policy: always
    restart: unless-stopped
    command: scripts/start/app.sh
    env_file:
      - /app/ow.env
    environment:
      - ENVIRONMENT=${ENVIRONMENT}
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=${OW_DB_NAME:-open-wearables}
      - DB_USER=${OW_DB_USER:-open-wearables}
      - DB_PASSWORD=${OW_DB_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - SERVER_HOST=http://${OW_PUBLIC_HOST}:8000
      - FRONTEND_URL=http://${OW_PUBLIC_HOST}
      - CORS_ORIGINS=["http://${OW_PUBLIC_HOST}"]
    # TCP-connect probe (curl is not present in the OW backend image; python is).
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket,sys; s=socket.socket(); s.settimeout(2); s.connect(('127.0.0.1',8000)); s.close()\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    depends_on:
      db: {condition: service_healthy}
      redis: {condition: service_healthy}
      svix-server: {condition: service_healthy}
    networks:
      - ow-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ow-api.rule=Host(`${OW_DOMAIN}`) && PathPrefix(`/api`)"
      - "traefik.http.routers.ow-api.entrypoints=websecure"
      - "traefik.http.routers.ow-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.ow-api.loadbalancer.server.port=8000"

  celery-worker:
    image: ${OW_IMAGE_BACKEND}
    pull_policy: always
    restart: unless-stopped
    command: scripts/start/worker.sh
    env_file:
      - /app/ow.env
    environment:
      - ENVIRONMENT=${ENVIRONMENT}
      - DB_HOST=db
      - DB_NAME=${OW_DB_NAME:-open-wearables}
      - DB_USER=${OW_DB_USER:-open-wearables}
      - DB_PASSWORD=${OW_DB_PASSWORD}
      - REDIS_HOST=redis
    # Probe the worker by asking celery to ping its own node. This only
    # succeeds once the worker has registered with the broker, so it is a
    # true readiness signal for zero-downtime rolling restarts.
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "uv run celery -A app.main:celery_app inspect ping -d celery@$$HOSTNAME >/dev/null 2>&1 || exit 1",
        ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 90s
    stop_grace_period: 60s
    depends_on:
      - db
      - redis
      - app
    networks:
      - ow-network

  # Beat is a singleton scheduler. Never run > 1 instance (duplicate cron
  # triggers). Deploys restart it in place with a brief gap.
  celery-beat:
    image: ${OW_IMAGE_BACKEND}
    pull_policy: always
    restart: unless-stopped
    command: scripts/start/beat.sh
    env_file:
      - /app/ow.env
    environment:
      - ENVIRONMENT=${ENVIRONMENT}
      - DB_HOST=db
      - DB_NAME=${OW_DB_NAME:-open-wearables}
      - DB_USER=${OW_DB_USER:-open-wearables}
      - DB_PASSWORD=${OW_DB_PASSWORD}
      - REDIS_HOST=redis
    depends_on:
      - db
      - redis
      - app
    networks:
      - ow-network

  # ---------------------------------------------------------------------------
  # Frontend dashboard
  # ---------------------------------------------------------------------------
  frontend:
    image: ${OW_IMAGE_FRONTEND}
    pull_policy: always
    restart: unless-stopped
    environment:
      - VITE_API_URL=http://${OW_PUBLIC_HOST}:8000
    networks:
      - ow-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ow-dashboard.rule=Host(`${OW_DOMAIN}`)"
      - "traefik.http.routers.ow-dashboard.entrypoints=websecure"
      - "traefik.http.routers.ow-dashboard.tls.certresolver=letsencrypt"
      - "traefik.http.services.ow-dashboard.loadbalancer.server.port=3000"

networks:
  ow-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  traefik_letsencrypt:
