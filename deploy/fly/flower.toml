# Fly.io config for Celery Flower (public, behind basic auth).
#
# Reuses the SAME backend image rather than rebuilding. After the API app is
# deployed, grab its image ref and deploy Flower against it:
#
#   IMG=$(fly image show -a open-wearables-api --json | jq -r '.Ref')
#   fly apps create open-wearables-flower
#   fly deploy --config deploy/fly/flower.toml --image "$IMG"
#
# Basic auth is enabled via the FLOWER_BASIC_AUTH secret (Flower reads any
# FLOWER_* env var as the matching option), e.g.:
#   fly secrets set -a open-wearables-flower FLOWER_BASIC_AUTH="admin:$(openssl rand -hex 16)"
# Flower also needs the same DB/Redis secrets as the backend (it connects to
# the broker) — see DEPLOY-FLY.md.
app = "open-wearables-flower"
primary_region = "iad"

[experimental]
  cmd = ["scripts/start/flower.sh"]

[env]
  ENVIRONMENT = "production"
  # Reuses the backend image, so it needs the same overrides as backend/fly.toml:
  # PYTHONPATH so imports resolve from /root_project/app, and REDIS_HOST pointing
  # at the internal Redis app (the broker Flower monitors).
  # Set DB_*, SECRET_KEY, and other sensitive values with `fly secrets set`.
  PYTHONPATH = "/root_project"
  REDIS_HOST = "open-wearables-redis.internal"

[http_service]
  internal_port = 5555
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
