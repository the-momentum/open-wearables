name: Deploy to staging

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-staging
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: 031244176128.dkr.ecr.us-east-1.amazonaws.com
  BACKEND_REPO: rhiseai/open-wearables-backend
  FRONTEND_REPO: rhiseai/open-wearables-frontend
  ROLE_ARN: arn:aws:iam::031244176128:role/github-actions-ow-publish

jobs:
  # ===========================================================================
  # Resolve EC2 public DNS (needed as VITE_API_URL at frontend build time)
  # ===========================================================================
  resolve-host:
    runs-on: ubuntu-latest
    environment: staging
    outputs:
      instance_id: ${{ steps.inst.outputs.instance_id }}
      public_dns: ${{ steps.inst.outputs.public_dns }}
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve staging instance id + public DNS
        id: inst
        run: |
          INSTANCE=$(aws ec2 describe-instances \
            --filters "Name=tag:app,Values=open-wearables" \
                      "Name=tag:environment,Values=staging" \
                      "Name=instance-state-name,Values=running" \
            --query 'Reservations[0].Instances[0].[InstanceId,PublicDnsName]' --output text)
          ID=$(echo "$INSTANCE" | awk '{print $1}')
          DNS=$(echo "$INSTANCE" | awk '{print $2}')
          if [[ "$ID" == "None" || -z "$ID" ]]; then
            echo "No running ow-staging instance found"; exit 1
          fi
          if [[ -z "$DNS" || "$DNS" == "None" ]]; then
            echo "Instance $ID has no public DNS — check that it has a public IP"; exit 1
          fi
          echo "instance_id=$ID" >> "$GITHUB_OUTPUT"
          echo "public_dns=$DNS" >> "$GITHUB_OUTPUT"

  # ===========================================================================
  # Build + push backend and frontend images to ECR
  # ===========================================================================
  build:
    needs: resolve-host
    runs-on: ubuntu-latest
    environment: staging
    outputs:
      backend_image: ${{ steps.tags.outputs.backend_image }}
      frontend_image: ${{ steps.tags.outputs.frontend_image }}
      sha_short: ${{ steps.tags.outputs.sha_short }}
    strategy:
      fail-fast: true
      matrix:
        include:
          - name: backend
            context: ./backend
            repo: rhiseai/open-wearables-backend
          - name: frontend
            context: ./frontend
            repo: rhiseai/open-wearables-frontend
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Compute tags
        id: tags
        env:
          SHA: ${{ github.sha }}
          REGISTRY: ${{ steps.ecr.outputs.registry }}
        run: |
          SHORT="${SHA:0:7}"
          echo "sha_short=$SHORT" >> "$GITHUB_OUTPUT"
          echo "backend_image=${REGISTRY}/${BACKEND_REPO}:staging" >> "$GITHUB_OUTPUT"
          echo "frontend_image=${REGISTRY}/${FRONTEND_REPO}:staging" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Build + push ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          platforms: linux/amd64
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
          build-args: |
            VITE_API_URL=http://${{ needs.resolve-host.outputs.public_dns }}:8000
          tags: |
            ${{ steps.ecr.outputs.registry }}/${{ matrix.repo }}:staging
            ${{ steps.ecr.outputs.registry }}/${{ matrix.repo }}:sha-${{ steps.tags.outputs.sha_short }}

  # ===========================================================================
  # Deploy: push compose + env to EC2 via SSM, run deploy.sh
  # ===========================================================================
  deploy:
    needs: [resolve-host, build]
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Wait for SSM agent
        env:
          INSTANCE_ID: ${{ needs.resolve-host.outputs.instance_id }}
        run: |
          for i in $(seq 1 30); do
            STATUS=$(aws ssm describe-instance-information \
              --filters "Key=InstanceIds,Values=${INSTANCE_ID}" \
              --query 'InstanceInformationList[0].PingStatus' --output text)
            if [[ "$STATUS" == "Online" ]]; then echo "SSM online"; exit 0; fi
            echo "  SSM status: $STATUS (retry $i)"; sleep 5
          done
          echo "SSM never came online"; exit 1

      - name: Generate .env from secrets
        id: env_gen
        env:
          OW_DB_PASSWORD: ${{ secrets.OW_DB_PASSWORD }}
          OW_PUBLIC_HOST: ${{ needs.resolve-host.outputs.public_dns }}
          BACKEND_IMAGE: ${{ needs.build.outputs.backend_image }}
          FRONTEND_IMAGE: ${{ needs.build.outputs.frontend_image }}
        run: |
          cat > .env.deploy <<EOF
          ENVIRONMENT=staging
          OW_PUBLIC_HOST=${OW_PUBLIC_HOST}
          OW_DB_NAME=open-wearables
          OW_DB_USER=open-wearables
          OW_DB_PASSWORD=${OW_DB_PASSWORD}
          OW_IMAGE_BACKEND=${BACKEND_IMAGE}
          OW_IMAGE_FRONTEND=${FRONTEND_IMAGE}
          EOF
          echo "env_b64=$(base64 -w0 .env.deploy)" >> "$GITHUB_OUTPUT"

      - name: Generate ow.env (backend provider secrets)
        id: ow_env_gen
        env:
          OW_SECRET_KEY: ${{ secrets.OW_SECRET_KEY }}
          OW_ADMIN_EMAIL: ${{ secrets.OW_ADMIN_EMAIL }}
          OW_ADMIN_PASSWORD: ${{ secrets.OW_ADMIN_PASSWORD }}
          OPEN_WEARABLES_API_KEY: ${{ secrets.OPEN_WEARABLES_API_KEY }}
          OW_PUBLIC_HOST: ${{ needs.resolve-host.outputs.public_dns }}
          # Providers
          GARMIN_CLIENT_ID: ${{ secrets.GARMIN_CLIENT_ID }}
          GARMIN_CLIENT_SECRET: ${{ secrets.GARMIN_CLIENT_SECRET }}
          OURA_CLIENT_ID: ${{ secrets.OURA_CLIENT_ID }}
          OURA_CLIENT_SECRET: ${{ secrets.OURA_CLIENT_SECRET }}
          OURA_WEBHOOK_VERIFICATION_TOKEN: ${{ secrets.OURA_WEBHOOK_VERIFICATION_TOKEN }}
          WHOOP_CLIENT_ID: ${{ secrets.WHOOP_CLIENT_ID }}
          WHOOP_CLIENT_SECRET: ${{ secrets.WHOOP_CLIENT_SECRET }}
          # Optional
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        run: |
          cat > ow.env.deploy <<EOF
          # Core
          SECRET_KEY=${OW_SECRET_KEY}
          ADMIN_EMAIL=${OW_ADMIN_EMAIL}
          ADMIN_PASSWORD=${OW_ADMIN_PASSWORD}
          OPEN_WEARABLES_API_KEY=${OPEN_WEARABLES_API_KEY}
          API_BASE_URL=http://${OW_PUBLIC_HOST}:8000
          SERVER_HOST=http://${OW_PUBLIC_HOST}:8000
          FRONTEND_URL=http://${OW_PUBLIC_HOST}
          CORS_ORIGINS=["http://${OW_PUBLIC_HOST}"]

          # Email
          RESEND_API_KEY=${RESEND_API_KEY}
          EMAIL_FROM_ADDRESS=noreply@getlucie.ai
          EMAIL_FROM_NAME=Open Wearables

          # Sentry (hardcoded disabled on staging)
          SENTRY_ENABLED=False
          SENTRY_DSN=${SENTRY_DSN}
          SENTRY_ENV=staging

          # Garmin
          GARMIN_CLIENT_ID=${GARMIN_CLIENT_ID}
          GARMIN_CLIENT_SECRET=${GARMIN_CLIENT_SECRET}

          # Oura
          OURA_CLIENT_ID=${OURA_CLIENT_ID}
          OURA_CLIENT_SECRET=${OURA_CLIENT_SECRET}
          OURA_DEFAULT_SCOPE=personal daily activity heartrate workout session spo2 ring_configuration heart_health
          OURA_WEBHOOK_VERIFICATION_TOKEN=${OURA_WEBHOOK_VERIFICATION_TOKEN}

          # Whoop
          WHOOP_CLIENT_ID=${WHOOP_CLIENT_ID}
          WHOOP_CLIENT_SECRET=${WHOOP_CLIENT_SECRET}
          WHOOP_DEFAULT_SCOPE=offline read:cycles read:sleep read:recovery read:workout read:body_measurement

          # Sync
          SYNC_INTERVAL_SECONDS=3600
          EOF
          echo "ow_env_b64=$(base64 -w0 ow.env.deploy)" >> "$GITHUB_OUTPUT"

      - name: Upload deploy tree + env to /app via SSM
        env:
          INSTANCE_ID: ${{ needs.resolve-host.outputs.instance_id }}
          ENV_B64: ${{ steps.env_gen.outputs.env_b64 }}
          OW_ENV_B64: ${{ steps.ow_env_gen.outputs.ow_env_b64 }}
        run: |
          TAR_B64=$(tar -C . -czf - deploy | base64 -w0)

          # Build the full remote script, base64-encode it, then send a single
          # short SSM command that decodes and runs it. This avoids every
          # quoting pitfall with `--parameters commands=...` shorthand (which
          # breaks on single quotes, commas, and brackets in payloads).
          REMOTE_SCRIPT=$(cat <<REMOTE_EOF
          set -e
          mkdir -p /app
          echo "$TAR_B64" | base64 -d | tar -xzf - -C /app
          echo "$ENV_B64" | base64 -d > /app/.env
          echo "$OW_ENV_B64" | base64 -d > /app/ow.env
          chmod +x /app/deploy/scripts/*.sh
          REMOTE_EOF
          )
          SCRIPT_B64=$(printf '%s' "$REMOTE_SCRIPT" | base64 -w0)

          # Use jq to build a clean JSON params file — dodges shorthand parser.
          jq -n --arg s "$SCRIPT_B64" \
            '{commands: ["echo \($s) | base64 -d | bash"]}' \
            > /tmp/ssm-params.json

          CMD_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "OW staging: sync deploy tree + env" \
            --parameters file:///tmp/ssm-params.json \
            --query 'Command.CommandId' --output text)
          echo "upload CommandId: $CMD_ID"
          if ! aws ssm wait command-executed --instance-id "$INSTANCE_ID" --command-id "$CMD_ID"; then
            aws ssm get-command-invocation --instance-id "$INSTANCE_ID" --command-id "$CMD_ID" \
              --query '{Status:Status,stdout:StandardOutputContent,stderr:StandardErrorContent}' --output text
            exit 1
          fi

      - name: Run deploy.sh via SSM
        env:
          INSTANCE_ID: ${{ needs.resolve-host.outputs.instance_id }}
        run: |
          jq -n '{commands: ["bash /app/deploy/scripts/deploy.sh"]}' > /tmp/ssm-run.json

          CMD_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "OW staging: deploy" \
            --parameters file:///tmp/ssm-run.json \
            --cloud-watch-output-config 'CloudWatchOutputEnabled=true' \
            --query 'Command.CommandId' --output text)
          echo "deploy CommandId: $CMD_ID"
          aws ssm wait command-executed --instance-id "$INSTANCE_ID" --command-id "$CMD_ID" || true
          aws ssm get-command-invocation \
            --instance-id "$INSTANCE_ID" \
            --command-id "$CMD_ID" \
            --query '{Status:Status,stdout:StandardOutputContent,stderr:StandardErrorContent}' --output text

      - name: Summary
        env:
          INSTANCE_ID: ${{ needs.resolve-host.outputs.instance_id }}
          BACKEND_IMAGE: ${{ needs.build.outputs.backend_image }}
          FRONTEND_IMAGE: ${{ needs.build.outputs.frontend_image }}
          OW_PUBLIC_HOST: ${{ needs.resolve-host.outputs.public_dns }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          {
            echo "## OW staging deployment"
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Instance | \`$INSTANCE_ID\` |"
            echo "| Backend | \`$BACKEND_IMAGE\` |"
            echo "| Frontend | \`$FRONTEND_IMAGE\` |"
            echo "| SHA | \`$COMMIT_SHA\` |"
            echo "| Dashboard | http://$OW_PUBLIC_HOST |"
            echo "| API | http://$OW_PUBLIC_HOST:8000 |"
            echo "| API Docs | http://$OW_PUBLIC_HOST:8000/docs |"
          } >> "$GITHUB_STEP_SUMMARY"
