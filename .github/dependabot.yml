version: 2
updates:
  # --- Python (uv) ---
  - package-ecosystem: "uv"
    directories:
      - "/backend"
      - "/mcp"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore"
    cooldown:
      default-days: 7
      semver-major-days: 30
      semver-minor-days: 7
      semver-patch-days: 3
    groups:
      python-minor-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]
      python-major:
        patterns: ["*"]
        update-types: ["major"]
    labels:
      - "dependencies"
    open-pull-requests-limit: 10

  # --- npm ---
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore"
    cooldown:
      default-days: 7
      semver-major-days: 30
      semver-minor-days: 7
      semver-patch-days: 3
    groups:
      npm-minor-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]
      npm-major:
        patterns: ["*"]
        update-types: ["major"]
    labels:
      - "dependencies"
    open-pull-requests-limit: 10
