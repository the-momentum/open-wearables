services:
  db:
    image: postgres:18
    container_name: postgres__open-wearables
    environment:
      POSTGRES_DB: open-wearables
      POSTGRES_USER: open-wearables
      POSTGRES_PASSWORD: open-wearables
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U open-wearables -d open-wearables"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./agent/scripts/postgres/init.sh:/docker-entrypoint-initdb.d/init.sh
    restart: unless-stopped

  app:
    build:
        context: ./backend
        dockerfile: Dockerfile
    container_name: backend__open-wearables
    image: open-wearables-platform:latest
    pull_policy: never
    command: scripts/start/app.sh
    env_file:
      - ./backend/config/.env
    environment:
      - DB_HOST=db
      - REDIS_HOST=redis
      - ENVIRONMENT=production
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  celery-worker:
    container_name: celery-worker__open-wearables
    image: open-wearables-platform:latest
    pull_policy: never
    command: scripts/start/worker.sh
    env_file:
      - ./backend/config/.env
    environment:
      - DB_HOST=db
      - REDIS_HOST=redis
      - ENVIRONMENT=production
    depends_on:
      redis:
        condition: service_started
      db:
        condition: service_healthy
      app:
        condition: service_healthy
    restart: unless-stopped

  celery-beat:
    container_name: celery-beat__open-wearables
    image: open-wearables-platform:latest
    pull_policy: never
    command: scripts/start/beat.sh
    env_file:
      - ./backend/config/.env
    environment:
      - DB_HOST=db
      - REDIS_HOST=redis
      - ENVIRONMENT=production
    depends_on:
      redis:
        condition: service_started
      db:
        condition: service_healthy
      app:
        condition: service_healthy
    restart: unless-stopped

  flower:
    container_name: flower__open-wearables
    image: open-wearables-platform:latest
    pull_policy: never
    command: scripts/start/flower.sh
    env_file:
      - ./backend/config/.env
    environment:
      - DB_HOST=db
      - REDIS_HOST=redis
      - ENVIRONMENT=production
    ports:
      - 5555:5555
    depends_on:
      redis:
        condition: service_started
      db:
        condition: service_healthy
      app:
        condition: service_healthy
    restart: unless-stopped

  redis:
    container_name: redis__open-wearables
    image: redis:8
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  agent:
    profiles: [agent]
    build:
      context: ./agent
      dockerfile: Dockerfile
    container_name: agent__open-wearables
    image: open-wearables-agent:latest
    pull_policy: never
    command: scripts/start/app.sh
    env_file:
      - ./agent/config/.env
    environment:
      - DB_HOST=db
      - REDIS_HOST=redis
      - ENVIRONMENT=production
    ports:
      - "8001:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health/db || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  agent-celery-worker:
    profiles: [agent]
    container_name: agent-celery-worker__open-wearables
    image: open-wearables-agent:latest
    pull_policy: never
    command: scripts/start/worker.sh
    env_file:
      - ./agent/config/.env
    environment:
      - DB_HOST=db
      - REDIS_HOST=redis
      - ENVIRONMENT=production
    depends_on:
      redis:
        condition: service_started
      db:
        condition: service_healthy
      agent:
        condition: service_healthy
    restart: unless-stopped

  agent-celery-beat:
    profiles: [agent]
    container_name: agent-celery-beat__open-wearables
    image: open-wearables-agent:latest
    pull_policy: never
    command: scripts/start/beat.sh
    env_file:
      - ./agent/config/.env
    environment:
      - DB_HOST=db
      - REDIS_HOST=redis
      - ENVIRONMENT=production
    depends_on:
      redis:
        condition: service_started
      db:
        condition: service_healthy
      agent:
        condition: service_healthy
    restart: unless-stopped

  svix-server:
    container_name: svix-server__open-wearables
    image: svix/svix-server:v1
    entrypoint:
      - sh
      - -c
      - |
        : "$${SVIX_JWT_SECRET:=$$SECRET_KEY}"
        export SVIX_JWT_SECRET
        exec svix-server "$$@"
      - --
    command: ["--run-migrations"]
    env_file:
      - ./backend/config/.env
    environment:
      SVIX_DB_DSN: "postgresql://${DB_USER:-open-wearables}:${DB_PASSWORD:-open-wearables}@${DB_HOST:-db}:${DB_PORT:-5432}/svix"
      SVIX_QUEUE_TYPE: "redis"
      SVIX_REDIS_DSN: "redis://redis:6379/1"
      SVIX_CACHE_TYPE: "redis"
    expose:
      - "8071"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      app:
        condition: service_started
    healthcheck:
      test: ["CMD", "svix-server", "healthcheck", "http://localhost:8071"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:?Set VITE_API_URL in your environment}
    container_name: frontend__open-wearables
    image: open-wearables-frontend:latest
    pull_policy: never
    ports:
      - "3000:3000"
    depends_on:
      - app
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
