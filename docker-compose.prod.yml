# Open Wearables — self-hosted production stack
#
# Runs the prebuilt images published to Docker Hub by the "Publish Docker
# images" GitHub workflow (.github/workflows/publish-images.yml). Unlike the
# dev docker-compose.yml, nothing is built from source here.
#
# Image tags default to :latest. Pin a specific build (e.g. for a repeatable
# deploy or a rollback) by exporting BACKEND_IMAGE / FRONTEND_IMAGE — any tag
# the workflow pushes works, including the per-commit sha-<short> tags:
#   BACKEND_IMAGE=themomentum/open-wearables-backend:sha-1a2b3c4 \
#   FRONTEND_IMAGE=themomentum/open-wearables-frontend:sha-1a2b3c4 \
#     docker compose -f docker-compose.prod.yml up -d
#
# PostgreSQL and Redis are bundled here so the stack runs out of the box. To
# point at managed services instead (RDS, ElastiCache, ...), drop the db/redis
# services via a docker-compose.override.yml and set DB_HOST/REDIS_HOST in
# ./backend/config/.env.

name: open-wearables

x-backend-image: &backend-image ${BACKEND_IMAGE:-themomentum/open-wearables-backend:latest}

services:
  db:
    image: postgres:18
    container_name: postgres__open-wearables
    environment:
      POSTGRES_DB: open-wearables
      POSTGRES_USER: open-wearables
      POSTGRES_PASSWORD: open-wearables
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U open-wearables -d open-wearables"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql
    restart: unless-stopped

  app:
    image: *backend-image
    container_name: backend__open-wearables
    command: scripts/start/app.sh
    env_file:
      - ./backend/config/.env
    environment:
      - DB_HOST=db
      - REDIS_HOST=redis
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  celery-worker:
    image: *backend-image
    container_name: celery-worker__open-wearables
    command: scripts/start/worker.sh
    env_file:
      - ./backend/config/.env
    environment:
      - DB_HOST=db
      - REDIS_HOST=redis
    depends_on:
      - redis
      - db
      - app
    restart: unless-stopped

  celery-beat:
    image: *backend-image
    container_name: celery-beat__open-wearables
    command: scripts/start/beat.sh
    env_file:
      - ./backend/config/.env
    environment:
      - DB_HOST=db
      - REDIS_HOST=redis
    depends_on:
      - redis
      - db
      - app
    restart: unless-stopped

  flower:
    image: *backend-image
    container_name: flower__open-wearables
    command: scripts/start/flower.sh
    env_file:
      - ./backend/config/.env
    environment:
      - DB_HOST=db
      - REDIS_HOST=redis
    ports:
      - "${FLOWER_PORT:-5555}:5555"
    depends_on:
      - redis
      - db
      - app
    restart: unless-stopped

  redis:
    container_name: redis__open-wearables
    image: redis:8
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  svix-server:
    container_name: svix-server__open-wearables
    image: svix/svix-server:v1
    entrypoint:
      - sh
      - -c
      - |
        : "$${SVIX_JWT_SECRET:=$$SECRET_KEY}"
        export SVIX_JWT_SECRET
        exec svix-server "$$@"
      - --
    command: ["--run-migrations"]
    env_file:
      - ./backend/config/.env
    environment:
      SVIX_DB_DSN: "postgresql://${DB_USER:-open-wearables}:${DB_PASSWORD:-open-wearables}@${DB_HOST:-db}:${DB_PORT:-5432}/svix"
      SVIX_QUEUE_TYPE: "redis"
      SVIX_REDIS_DSN: "redis://redis:6379/1"
      SVIX_CACHE_TYPE: "redis"
    expose:
      - "8071"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      app:
        condition: service_started
    healthcheck:
      test: ["CMD", "svix-server", "healthcheck", "http://localhost:8071"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    restart: unless-stopped

  frontend:
    image: ${FRONTEND_IMAGE:-themomentum/open-wearables-frontend:latest}
    container_name: frontend__open-wearables
    # VITE_API_URL is read at runtime by the Nitro SSR server (and injected into
    # the browser) — nothing is baked into the image at build time. Set it in
    # ./frontend/.env (see ./frontend/.env.example).
    env_file:
      - ./frontend/.env
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - app
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
