services:
  db:
    image: postgres:18
    container_name: postgres__open-wearables
    environment:
      POSTGRES_DB: open-wearables
      POSTGRES_USER: open-wearables
      POSTGRES_PASSWORD: open-wearables
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U open-wearables -d open-wearables"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql
    restart: unless-stopped

  db-svix-init:
    image: postgres:18
    environment:
      PGPASSWORD: ${DB_PASSWORD:-open-wearables}
    command:
      - bash
      - -c
      - |
        createdb -h ${DB_HOST:-db} -U ${DB_USER:-open-wearables} svix || \
          psql -h ${DB_HOST:-db} -U ${DB_USER:-open-wearables} -d svix -c 'SELECT 1'
        if [ ! -f /run/svix-secrets/jwt_secret ]; then
          openssl rand -hex 32 > /run/svix-secrets/jwt_secret
          chmod 644 /run/svix-secrets/jwt_secret
        fi
    volumes:
      - svix_secrets:/run/svix-secrets
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure

  app:
    build:
        context: ./backend
        dockerfile: Dockerfile
    container_name: backend__open-wearables
    image: open-wearables-platform:latest
    pull_policy: never
    command: scripts/start/app.sh
    env_file:
      - ./backend/config/.env
    environment:
      - DB_HOST=db
      - REDIS_HOST=redis
    volumes:
      - svix_secrets:/run/svix-secrets:ro
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      svix-server:
        condition: service_healthy
    restart: unless-stopped

  celery-worker:
    container_name: celery-worker__open-wearables
    image: open-wearables-platform:latest
    pull_policy: never
    command: scripts/start/worker.sh
    env_file:
      - ./backend/config/.env
    environment:
      - DB_HOST=db
      - REDIS_HOST=redis
    volumes:
      - svix_secrets:/run/svix-secrets:ro
    depends_on:
      - redis
      - db
      - app
    restart: unless-stopped

  celery-beat:
    container_name: celery-beat__open-wearables
    image: open-wearables-platform:latest
    pull_policy: never
    command: scripts/start/beat.sh
    env_file:
      - ./backend/config/.env
    environment:
      - DB_HOST=db
      - REDIS_HOST=redis
    depends_on:
      - redis
      - db
      - app
    restart: unless-stopped

  flower:
    container_name: flower__open-wearables
    image: open-wearables-platform:latest
    pull_policy: never
    command: scripts/start/flower.sh
    env_file:
      - ./backend/config/.env
    environment:
      - DB_HOST=db
      - REDIS_HOST=redis
    ports:
      - 5555:5555
    depends_on:
      - redis
      - db
      - app
    restart: unless-stopped

  redis:
    container_name: redis__open-wearables
    image: redis:8
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/var/lib/redis/data
    restart: unless-stopped

  svix-server:
    container_name: svix-server__open-wearables
    image: svix/svix-server:v1
    entrypoint:
      - sh
      - -c
      - |
        export SVIX_JWT_SECRET=$(cat /run/svix-secrets/jwt_secret)
        exec /usr/local/bin/svix-server "$@"
      - --
    command: ["--run-migrations"]
    environment:
      SVIX_DB_DSN: "postgresql://${DB_USER:-open-wearables}:${DB_PASSWORD:-open-wearables}@${DB_HOST:-db}:${DB_PORT:-5432}/svix"
      SVIX_QUEUE_TYPE: "redis"
      SVIX_REDIS_DSN: "redis://redis:6379/1"
      SVIX_CACHE_TYPE: "redis"
    volumes:
      - svix_secrets:/run/svix-secrets
    expose:
      - "8071"
    depends_on:
      db-svix-init:
        condition: service_completed_successfully
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "svix-server", "healthcheck", "http://localhost:8071"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:?Set VITE_API_URL in your environment}
    container_name: frontend__open-wearables
    image: open-wearables-frontend:latest
    pull_policy: never
    ports:
      - "3000:3000"
    depends_on:
      - app
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  svix_secrets:
