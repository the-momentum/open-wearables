repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: sh -c 'cd backend && uv run ruff check --fix'
        language: system
        files: ^backend/.*\.py$
        pass_filenames: false
      - id: ruff-format
        name: ruff format
        entry: sh -c 'cd backend && uv run ruff format'
        language: system
        files: ^backend/.*\.py$
        pass_filenames: false
      - id: ty
        name: ty check
        entry: sh -c 'cd backend && uv run ty check .'
        language: system
        files: ^backend/.*\.py$
        pass_filenames: false
      - id: agent-ruff-check
        name: agent ruff check
        entry: sh -c 'cd agent && uv run ruff check --fix'
        language: system
        files: ^agent/.*\.py$
        pass_filenames: false
      - id: agent-ruff-format
        name: agent ruff format
        entry: sh -c 'cd agent && uv run ruff format'
        language: system
        files: ^agent/.*\.py$
        pass_filenames: false
      - id: agent-ty
        name: agent ty check
        entry: sh -c 'cd agent && uv run ty check .'
        language: system
        files: ^agent/.*\.py$
        pass_filenames: false

      - id: prettier-check
        name: prettier check
        entry: sh -c 'cd frontend && pnpm run format:check'
        language: system
        files: ^frontend/src/.*\.(ts|tsx|js|jsx|json|css|md)$
        pass_filenames: false

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        files: ^(backend|agent|mcp)/
      - id: end-of-file-fixer
        files: ^(backend|agent|mcp)/
      - id: check-merge-conflict
        args: [--assume-in-merge]
        files: ^(backend|agent|mcp)/