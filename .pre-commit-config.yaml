repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: sh -c 'cd backend && uv run ruff check --fix'
        language: system
        files: ^backend/.*\.py$
        pass_filenames: false
      - id: ruff-format
        name: ruff format
        entry: sh -c 'cd backend && uv run ruff format'
        language: system
        files: ^backend/.*\.py$
        pass_filenames: false
      - id: ty
        name: ty check
        entry: sh -c 'cd backend && uv run ty check .'
        language: system
        files: ^backend/.*\.py$
        pass_filenames: false
      - id: generate-coverage-docs
        name: regenerate coverage docs
        entry: sh -c 'cd backend && uv run python scripts/generate_coverage_docs.py'
        language: system
        files: ^backend/app/(services/providers/.*/coverage\.py|services/providers/base_strategy\.py|api/routes/v1/meta\.py)$
        pass_filenames: false

      - id: prettier-check
        name: prettier check
        entry: sh -c 'cd frontend && pnpm run format:check'
        language: system
        files: ^frontend/src/.*\.(ts|tsx|js|jsx|json|css|md)$
        pass_filenames: false

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        files: ^(backend|mcp)/
      - id: end-of-file-fixer
        files: ^(backend|mcp)/
      - id: check-merge-conflict
        args: [--assume-in-merge]
        files: ^(backend|mcp)/