# Fly.io config for the Open Wearables frontend (Nitro node server on :3000).
#
# First time:   fly launch --no-deploy --copy-config --name open-wearables-frontend
# Deploy:       fly deploy --env VITE_API_URL=https://open-wearables-api.fly.dev
app = "open-wearables-frontend"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "3000"
  HOST = "0.0.0.0"
  VITE_API_URL = "https://open-wearables-api.fly.dev"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
